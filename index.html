<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Countdown — Precision timer for the moments that matter</title>
<meta name="description" content="A refined countdown timer with live progress tracking.">

<!-- Premium typefaces: Inter for UI, JetBrains Mono for tabular countdown digits -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     DESIGN TOKENS
     8px spacing system · soft neutral palette · refined indigo accent
     ============================================================ */
  :root{
    --bg:#FAFAF9;
    --surface:#FFFFFF;
    --surface-2:#F4F4F5;
    --surface-glass:rgba(255,255,255,0.72);
    --border:#E7E7E5;
    --border-strong:#D8D8D6;
    --text:#18181B;
    --text-secondary:#6B6B70;
    --text-tertiary:#A3A3A8;
    --accent:#4F46E5;
    --accent-hover:#4338CA;
    --accent-soft:#EEF0FF;
    --accent-ring:rgba(79,70,229,0.18);
    --success:#0FA968;
    --success-soft:#E9FBF3;
    --danger:#E5484D;
    --danger-soft:#FDEDEE;
    --shadow-sm: 0 1px 2px rgba(24,24,27,0.04), 0 1px 1px rgba(24,24,27,0.03);
    --shadow-md: 0 4px 12px rgba(24,24,27,0.06), 0 2px 4px rgba(24,24,27,0.04);
    --shadow-lg: 0 16px 40px rgba(24,24,27,0.10), 0 4px 12px rgba(24,24,27,0.06);
    --shadow-focus: 0 0 0 3px var(--accent-ring);
    --radius-sm:10px;
    --radius-md:14px;
    --radius-lg:18px;
    --radius-pill:999px;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-snap: cubic-bezier(0.34, 1.56, 0.64, 1);
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
    color-scheme: light;
  }

  [data-theme="dark"]{
    --bg:#0A0A0C;
    --surface:#131316;
    --surface-2:#1B1B1F;
    --surface-glass:rgba(19,19,22,0.72);
    --border:#26262B;
    --border-strong:#333338;
    --text:#F4F4F5;
    --text-secondary:#9C9CA3;
    --text-tertiary:#6B6B70;
    --accent:#8B87F5;
    --accent-hover:#A29EFF;
    --accent-soft:rgba(139,135,245,0.14);
    --accent-ring:rgba(139,135,245,0.28);
    --success:#3DD68C;
    --success-soft:rgba(61,214,140,0.12);
    --danger:#F17077;
    --danger-soft:rgba(241,112,119,0.12);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
    --shadow-lg: 0 20px 48px rgba(0,0,0,0.5);
    color-scheme: dark;
  }

  *,*::before,*::after{ box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0;
    font-family:var(--font-ui);
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    transition:background 0.4s var(--ease), color 0.4s var(--ease);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* Respect reduced motion preference globally */
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; scroll-behavior:auto !important; }
  }

  ::selection{ background:var(--accent-soft); color:var(--accent); }

  :focus-visible{
    outline:none;
    box-shadow:var(--shadow-focus);
    border-radius:var(--radius-sm);
  }

  button{ font-family:inherit; }

  /* ============================================================
     LAYOUT
     ============================================================ */
  .app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .topbar{
    width:100%;
    max-width:960px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:24px 24px 0;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    font-size:14px;
    letter-spacing:-0.01em;
    color:var(--text);
  }

  .brand-mark{
    width:22px; height:22px;
    border-radius:7px;
    background:linear-gradient(155deg, var(--accent), #7A73F0 65%);
    display:inline-block;
    box-shadow:0 2px 8px var(--accent-ring);
    position:relative;
    flex-shrink:0;
  }
  .brand-mark::after{
    content:"";
    position:absolute; inset:6px;
    border-radius:3px;
    border:2px solid rgba(255,255,255,0.85);
    border-right-color:transparent;
  }

  .topbar-actions{ display:flex; gap:8px; }

  .icon-btn{
    width:36px; height:36px;
    display:flex; align-items:center; justify-content:center;
    border-radius:var(--radius-sm);
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text-secondary);
    cursor:pointer;
    transition:transform 0.2s var(--ease), border-color 0.2s var(--ease), color 0.2s var(--ease), box-shadow 0.2s var(--ease);
  }
  .icon-btn:hover{
    color:var(--text);
    border-color:var(--border-strong);
    box-shadow:var(--shadow-sm);
    transform:translateY(-1px);
  }
  .icon-btn:active{ transform:translateY(0) scale(0.96); }
  .icon-btn svg{ width:16px; height:16px; }

  .stage{
    flex:1;
    width:100%;
    max-width:520px;
    padding:40px 24px 64px;
    display:flex;
    flex-direction:column;
    align-items:stretch;
  }

  .eyebrow{
    text-align:center;
    font-size:12px;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-tertiary);
    margin:0 0 8px;
  }

  .headline{
    text-align:center;
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.02em;
    margin:0 0 40px;
    color:var(--text);
  }

  /* ============================================================
     PANEL / CARD
     ============================================================ */
  .panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-md);
    padding:32px;
    animation:panelIn 0.5s var(--ease) both;
  }

  @keyframes panelIn{
    from{ opacity:0; transform:translateY(10px) scale(0.99); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .field{ margin-bottom:24px; }
  .field:last-of-type{ margin-bottom:0; }

  .field label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--text-secondary);
    margin-bottom:8px;
    letter-spacing:-0.005em;
  }

  .text-input{
    width:100%;
    padding:12px 14px;
    font-size:15px;
    font-family:inherit;
    font-weight:500;
    color:var(--text);
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    transition:border-color 0.2s var(--ease), background 0.2s var(--ease), box-shadow 0.2s var(--ease);
  }
  .text-input::placeholder{ color:var(--text-tertiary); font-weight:400; }
  .text-input:hover{ border-color:var(--border-strong); }
  .text-input:focus{
    outline:none;
    background:var(--surface);
    border-color:var(--accent);
    box-shadow:var(--shadow-focus);
  }

  /* Native date input needs a little extra care for the calendar icon in dark mode */
  input[type="datetime-local"]{ color-scheme:light; }
  [data-theme="dark"] input[type="datetime-local"]{ color-scheme:dark; }

  .error{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    font-weight:500;
    color:var(--danger);
    background:var(--danger-soft);
    border-radius:var(--radius-sm);
    padding:10px 12px;
    margin-top:12px;
    animation:shake 0.4s var(--ease);
  }
  .error svg{ width:14px; height:14px; flex-shrink:0; }

  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-4px); }
    75%{ transform:translateX(4px); }
  }

  /* Presets */
  .presets{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:24px;
  }

  .chip{
    padding:8px 14px;
    font-size:13px;
    font-weight:500;
    color:var(--text-secondary);
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:var(--radius-pill);
    cursor:pointer;
    transition:all 0.2s var(--ease);
  }
  .chip:hover{
    color:var(--text);
    border-color:var(--border-strong);
    transform:translateY(-1px);
  }
  .chip.active{
    color:var(--accent);
    background:var(--accent-soft);
    border-color:transparent;
  }

  /* Buttons */
  .btn{
    appearance:none;
    border:none;
    cursor:pointer;
    border-radius:var(--radius-sm);
    font-weight:600;
    font-size:14px;
    letter-spacing:-0.005em;
    padding:13px 20px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:transform 0.15s var(--ease-snap), box-shadow 0.2s var(--ease), background 0.2s var(--ease), opacity 0.2s var(--ease);
  }
  .btn svg{ width:16px; height:16px; }
  .btn:active{ transform:scale(0.97); }

  .btn-primary{
    width:100%;
    background:var(--accent);
    color:#fff;
    box-shadow:0 1px 2px rgba(0,0,0,0.05), 0 8px 20px var(--accent-ring);
  }
  .btn-primary:hover{ background:var(--accent-hover); transform:translateY(-1px); }
  .btn-primary:disabled{ opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }

  .btn-secondary{
    background:var(--surface-2);
    color:var(--text);
    border:1px solid var(--border);
  }
  .btn-secondary:hover{ border-color:var(--border-strong); background:var(--surface); box-shadow:var(--shadow-sm); transform:translateY(-1px); }

  .btn-ghost{
    background:transparent;
    color:var(--text-secondary);
  }
  .btn-ghost:hover{ color:var(--text); background:var(--surface-2); }

  /* ============================================================
     DISPLAY PANEL — the countdown itself
     ============================================================ */
  .event-header{
    text-align:center;
    margin-bottom:32px;
  }
  .event-label{
    font-size:20px;
    font-weight:700;
    letter-spacing:-0.02em;
    color:var(--text);
    margin:0 0 6px;
    word-break:break-word;
  }
  .event-sublabel{
    font-size:13px;
    color:var(--text-tertiary);
    font-weight:500;
  }
  .status-pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.03em;
    text-transform:uppercase;
    padding:4px 10px;
    border-radius:var(--radius-pill);
    background:var(--success-soft);
    color:var(--success);
    margin-bottom:12px;
  }
  .status-pill .dot{
    width:6px; height:6px; border-radius:50%;
    background:currentColor;
    animation:pulse 1.6s ease-in-out infinite;
  }
  .status-pill.paused{ background:var(--surface-2); color:var(--text-secondary); }
  .status-pill.paused .dot{ animation:none; }

  @keyframes pulse{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.4; transform:scale(0.8); }
  }

  /* Ring */
  .ring-wrap{
    position:relative;
    width:280px;
    height:280px;
    margin:0 auto 32px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .ring-svg{ width:100%; height:100%; transform:rotate(-90deg); }
  .ring-track{ fill:none; stroke:var(--surface-2); stroke-width:6; }
  .ring-progress{
    fill:none;
    stroke:var(--accent);
    stroke-width:6;
    stroke-linecap:round;
    transition:stroke-dashoffset 0.6s var(--ease), stroke 0.4s var(--ease);
  }

  .ring-content{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    padding:24px;
  }

  .digits{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
    width:100%;
  }

  .digit-group{
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .digit-value{
    font-family:var(--font-mono);
    font-variant-numeric:tabular-nums;
    font-size:28px;
    font-weight:600;
    letter-spacing:-0.01em;
    color:var(--text);
    line-height:1.1;
    display:inline-block;
  }

  .digit-value.flip{
    animation:flipDigit 0.4s var(--ease);
  }

  @keyframes flipDigit{
    0%{ transform:translateY(0) scale(1); opacity:1; }
    40%{ transform:translateY(-6px) scale(0.94); opacity:0.5; }
    100%{ transform:translateY(0) scale(1); opacity:1; }
  }

  .digit-label{
    font-size:10px;
    font-weight:600;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text-tertiary);
    margin-top:4px;
  }

  .digit-sep{
    display:none; /* separators handled by grid gap for clean minimal look */
  }

  /* Progress bar (secondary, linear) */
  .progress-track{
    width:100%;
    height:4px;
    border-radius:var(--radius-pill);
    background:var(--surface-2);
    overflow:hidden;
    margin-bottom:28px;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--accent), #8B87F5);
    border-radius:var(--radius-pill);
    transition:width 0.6s var(--ease);
    width:0%;
  }

  .controls{
    display:flex;
    gap:8px;
  }
  .controls .btn{ flex:1; }

  /* ============================================================
     EMPTY / COMPLETE STATES
     ============================================================ */
  .empty-state{
    text-align:center;
    padding:8px 0 4px;
  }
  .empty-illustration{
    width:56px; height:56px;
    margin:0 auto 16px;
    border-radius:16px;
    background:var(--accent-soft);
    display:flex; align-items:center; justify-content:center;
    color:var(--accent);
  }
  .empty-illustration svg{ width:26px; height:26px; }

  .complete-panel{
    text-align:center;
  }
  .complete-icon{
    width:64px; height:64px;
    margin:0 auto 20px;
    border-radius:20px;
    background:var(--success-soft);
    color:var(--success);
    display:flex; align-items:center; justify-content:center;
    animation:successPop 0.5s var(--ease-snap) both;
  }
  .complete-icon svg{ width:30px; height:30px; }

  @keyframes successPop{
    0%{ transform:scale(0.4); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }

  .complete-title{
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.02em;
    margin:0 0 8px;
  }
  .complete-sub{
    font-size:14px;
    color:var(--text-secondary);
    margin:0 0 28px;
  }

  /* ============================================================
     FOOTER HINT
     ============================================================ */
  .kbd-hint{
    text-align:center;
    font-size:12px;
    color:var(--text-tertiary);
    margin-top:24px;
  }
  .kbd-hint kbd{
    font-family:var(--font-mono);
    font-size:11px;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:4px;
    padding:1px 6px;
    color:var(--text-secondary);
  }

  /* Confetti canvas */
  #confettiCanvas{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:50;
  }

  /* Sr-only utility */
  .sr-only{
    position:absolute; width:1px; height:1px;
    padding:0; margin:-1px; overflow:hidden;
    clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }

  [hidden]{ display:none !important; }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width:480px){
    .stage{ padding:24px 16px 48px; }
    .panel{ padding:24px 20px; }
    .ring-wrap{ width:240px; height:240px; }
    .digit-value{ font-size:22px; }
    .headline{ font-size:22px; }
    .controls{ flex-wrap:wrap; }
    .controls .btn{ flex:1 1 45%; }
  }

  @media (min-width:481px) and (max-width:768px){
    .stage{ max-width:480px; }
  }
</style>
</head>
<body>

<div class="app">

  <!-- ============================================================
       TOP BAR
       ============================================================ -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      Countdown
    </div>
    <div class="topbar-actions">
      <button id="soundToggle" class="icon-btn" type="button" aria-label="Mute sound" aria-pressed="false" title="Toggle sound">
        <svg id="soundIconOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        <svg id="soundIconOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
      </button>
      <button id="fullscreenToggle" class="icon-btn" type="button" aria-label="Enter fullscreen" title="Toggle fullscreen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
      </button>
      <button id="themeToggle" class="icon-btn" type="button" aria-label="Switch to dark theme" title="Toggle theme">
        <svg id="themeIconLight" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="themeIconDark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
  </header>

  <!-- ============================================================
       MAIN STAGE
       ============================================================ -->
  <main class="stage">

    <p class="eyebrow">Precision timing</p>
    <h1 class="headline">Count down to what matters</h1>

    <!-- SETUP PANEL: shown before a countdown is running -->
    <section class="panel" id="setupPanel" aria-labelledby="setupHeading">
      <h2 id="setupHeading" class="sr-only">Set up a new countdown</h2>

      <div class="field">
        <label for="eventTitle">Event name</label>
        <input type="text" id="eventTitle" class="text-input" placeholder="e.g. Product launch" maxlength="60" autocomplete="off">
      </div>

      <div class="field">
        <label for="targetDate">Target date &amp; time</label>
        <input type="datetime-local" id="targetDate" class="text-input">
        <div class="error" id="errorMsg" role="alert" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <span id="errorText">Please choose a date in the future.</span>
        </div>
      </div>

      <div class="field">
        <label id="presetsLabel">Quick presets</label>
        <div class="presets" id="presets" role="group" aria-labelledby="presetsLabel"></div>
      </div>

      <button class="btn btn-primary" id="startBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        Start countdown
      </button>
    </section>

    <!-- DISPLAY PANEL: shown while a countdown is active or paused -->
    <section class="panel" id="displayPanel" hidden aria-labelledby="displayHeading">
      <h2 id="displayHeading" class="sr-only">Active countdown</h2>

      <div class="event-header">
        <span class="status-pill" id="statusPill"><span class="dot"></span><span id="statusText">Counting down</span></span>
        <p class="event-label" id="eventLabelDisplay">Event</p>
        <p class="event-sublabel" id="eventSublabel">—</p>
      </div>

      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 100 100" aria-hidden="true">
          <circle class="ring-track" cx="50" cy="50" r="45"></circle>
          <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="45" stroke-dasharray="282.7" stroke-dashoffset="282.7"></circle>
        </svg>
        <div class="ring-content">
          <div class="digits" aria-live="polite" aria-atomic="true">
            <div class="digit-group">
              <span class="digit-value" id="valDays">00</span>
              <span class="digit-label">Days</span>
            </div>
            <div class="digit-group">
              <span class="digit-value" id="valHours">00</span>
              <span class="digit-label">Hours</span>
            </div>
            <div class="digit-group">
              <span class="digit-value" id="valMinutes">00</span>
              <span class="digit-label">Min</span>
            </div>
            <div class="digit-group">
              <span class="digit-value" id="valSeconds">00</span>
              <span class="digit-label">Sec</span>
            </div>
          </div>
        </div>
      </div>

      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="controls">
        <button class="btn btn-secondary" id="pauseResumeBtn" type="button">Pause</button>
        <button class="btn btn-secondary" id="editBtn" type="button">Edit date</button>
        <button class="btn btn-ghost" id="resetBtn" type="button">Reset</button>
      </div>

      <p class="kbd-hint"><kbd>Space</kbd> pause/resume · <kbd>R</kbd> reset · <kbd>F</kbd> fullscreen</p>
    </section>

    <!-- COMPLETE PANEL: shown when countdown reaches zero -->
    <section class="panel complete-panel" id="completePanel" hidden aria-labelledby="completeHeading">
      <div class="complete-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      </div>
      <h2 class="complete-title" id="completeHeading">Time's up</h2>
      <p class="complete-sub" id="completeSub">Your countdown to “Event” has ended.</p>
      <button class="btn btn-primary" id="newCountdownBtn" type="button">Start a new countdown</button>
    </section>

  </main>
</div>

<canvas id="confettiCanvas" aria-hidden="true"></canvas>

<script>
/* ==================================================================
   COUNTDOWN TIMER — vanilla JS, modular structure
   Modules: Storage, Theme, Sound, Confetti, Ring, Timer, App(UI glue)
   ================================================================== */
(function(){
  "use strict";

  /* ---------------- Storage module ---------------- */
  const Storage = {
    THEME_KEY: "countdown.theme",
    SOUND_KEY: "countdown.soundEnabled",
    STATE_KEY: "countdown.state",
    getTheme(){ try{ return localStorage.getItem(this.THEME_KEY); }catch(e){ return null; } },
    setTheme(v){ try{ localStorage.setItem(this.THEME_KEY, v); }catch(e){} },
    getSound(){ try{ return localStorage.getItem(this.SOUND_KEY); }catch(e){ return null; } },
    setSound(v){ try{ localStorage.setItem(this.SOUND_KEY, v); }catch(e){} },
    saveState(state){ try{ localStorage.setItem(this.STATE_KEY, JSON.stringify(state)); }catch(e){} },
    loadState(){ try{ const raw = localStorage.getItem(this.STATE_KEY); return raw ? JSON.parse(raw) : null; }catch(e){ return null; } },
    clearState(){ try{ localStorage.removeItem(this.STATE_KEY); }catch(e){} }
  };

  /* ---------------- Theme module ---------------- */
  const Theme = {
    init(){
      const saved = Storage.getTheme();
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      this.apply(theme);
    },
    apply(theme){
      document.documentElement.setAttribute('data-theme', theme);
      Storage.setTheme(theme);
      const isDark = theme === 'dark';
      document.getElementById('themeIconLight').hidden = isDark;
      document.getElementById('themeIconDark').hidden = !isDark;
      document.getElementById('themeToggle').setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme');
    },
    toggle(){
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      this.apply(current === 'light' ? 'dark' : 'light');
    }
  };

  /* ---------------- Sound module (Web Audio, no external files) ---------------- */
  const Sound = {
    enabled: true,
    ctx: null,
    init(){
      const saved = Storage.getSound();
      this.enabled = saved === null ? true : saved === 'true';
      this.reflectUI();
    },
    getCtx(){
      if(!this.ctx){
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if(AudioCtx) this.ctx = new AudioCtx();
      }
      return this.ctx;
    },
    toggle(){
      this.enabled = !this.enabled;
      Storage.setSound(String(this.enabled));
      this.reflectUI();
    },
    reflectUI(){
      document.getElementById('soundIconOn').hidden = !this.enabled;
      document.getElementById('soundIconOff').hidden = this.enabled;
      document.getElementById('soundToggle').setAttribute('aria-pressed', String(!this.enabled));
      document.getElementById('soundToggle').setAttribute('aria-label', this.enabled ? 'Mute sound' : 'Unmute sound');
    },
    /* Gentle two-tone chime, synthesized — no external audio assets needed */
    playCompletion(){
      if(!this.enabled) return;
      const ctx = this.getCtx();
      if(!ctx) return;
      const now = ctx.currentTime;
      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const start = now + i * 0.12;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.14, start + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.6);
        osc.connect(gain).connect(ctx.destination);
        osc.start(start);
        osc.stop(start + 0.65);
      });
    },
    playTick(){
      if(!this.enabled) return;
      const ctx = this.getCtx();
      if(!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      const now = ctx.currentTime;
      gain.gain.setValueAtTime(0.05, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.09);
    }
  };

  /* ---------------- Confetti module (lightweight canvas particles) ---------------- */
  const Confetti = {
    canvas: null, ctx: null, particles: [], raf: null,
    colors: ['#4F46E5', '#8B87F5', '#0FA968', '#F5A623', '#E5484D'],
    init(){
      this.canvas = document.getElementById('confettiCanvas');
      this.ctx = this.canvas.getContext('2d');
      this.resize();
      window.addEventListener('resize', () => this.resize());
    },
    resize(){
      this.canvas.width = window.innerWidth * devicePixelRatio;
      this.canvas.height = window.innerHeight * devicePixelRatio;
      this.canvas.style.width = window.innerWidth + 'px';
      this.canvas.style.height = window.innerHeight + 'px';
    },
    burst(){
      if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const count = 140;
      const cx = window.innerWidth / 2;
      this.particles = [];
      for(let i = 0; i < count; i++){
        const angle = (Math.random() * Math.PI) + Math.PI; // upward-ish spread
        const speed = 4 + Math.random() * 8;
        this.particles.push({
          x: cx + (Math.random() - 0.5) * 200,
          y: window.innerHeight * 0.35,
          vx: Math.cos(angle) * speed * 0.6,
          vy: Math.sin(angle) * speed - 6,
          size: 5 + Math.random() * 5,
          color: this.colors[Math.floor(Math.random() * this.colors.length)],
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 12,
          life: 0,
          maxLife: 90 + Math.random() * 40
        });
      }
      this.animate();
    },
    animate(){
      const ctx = this.ctx;
      const dpr = devicePixelRatio;
      ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      let alive = false;
      ctx.save();
      ctx.scale(dpr, dpr);
      this.particles.forEach(p => {
        p.life++;
        if(p.life > p.maxLife) return;
        alive = true;
        p.vy += 0.18; // gravity
        p.x += p.vx;
        p.y += p.vy;
        p.rotation += p.rotSpeed;
        const opacity = 1 - (p.life / p.maxLife);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = Math.max(opacity, 0);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
        ctx.restore();
      });
      ctx.restore();
      if(alive){
        this.raf = requestAnimationFrame(() => this.animate());
      }else{
        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      }
    }
  };

  /* ---------------- Ring module ---------------- */
  const Ring = {
    circle: null,
    circumference: 2 * Math.PI * 45,
    init(){
      this.circle = document.getElementById('ringProgress');
      this.circle.style.strokeDasharray = String(this.circumference);
      this.setProgress(0);
    },
    setProgress(fraction){ // fraction 0..1 = elapsed
      const clamped = Math.min(Math.max(fraction, 0), 1);
      const offset = this.circumference * (1 - clamped);
      this.circle.style.strokeDashoffset = String(offset);
    }
  };

  /* ---------------- Timer module ---------------- */
  const Timer = {
    targetTime: null,
    startTime: null,
    totalDuration: null,
    remainingAtPause: null,
    status: 'idle', // idle | running | paused | completed
    intervalId: null,
    lastWholeSecond: null,
    onTick: null,
    onComplete: null,

    start(targetTime, startTime){
      this.targetTime = targetTime;
      this.startTime = startTime || Date.now();
      this.totalDuration = this.targetTime - this.startTime;
      this.status = 'running';
      this.lastWholeSecond = null;
      this._loop();
    },

    resumeFromState(targetTime, startTime, status){
      this.targetTime = targetTime;
      this.startTime = startTime;
      this.totalDuration = this.targetTime - this.startTime;
      this.status = status;
      if(status === 'running') this._loop();
    },

    pause(){
      if(this.status !== 'running') return;
      this.status = 'paused';
      this._stopLoop();
    },

    resume(){
      if(this.status !== 'paused') return;
      this.status = 'running';
      this._loop();
    },

    reset(){
      this._stopLoop();
      this.status = 'idle';
      this.targetTime = null;
      this.startTime = null;
      this.totalDuration = null;
    },

    _loop(){
      this._stopLoop();
      this._tick();
      this.intervalId = setInterval(() => this._tick(), 250);
    },

    _stopLoop(){
      if(this.intervalId){ clearInterval(this.intervalId); this.intervalId = null; }
    },

    _tick(){
      const now = Date.now();
      const remaining = this.targetTime - now;
      const elapsed = now - this.startTime;
      const fraction = this.totalDuration > 0 ? elapsed / this.totalDuration : 1;

      if(remaining <= 0){
        this._stopLoop();
        this.status = 'completed';
        if(this.onTick) this.onTick({ days:0, hours:0, minutes:0, seconds:0, fraction: 1, wholeSecondChanged: true });
        if(this.onComplete) this.onComplete();
        return;
      }

      const totalSeconds = Math.ceil(remaining / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      const wholeSecondChanged = this.lastWholeSecond !== totalSeconds;
      this.lastWholeSecond = totalSeconds;

      if(this.onTick){
        this.onTick({ days, hours, minutes, seconds, fraction, wholeSecondChanged });
      }
    }
  };

  /* ==================================================================
     APP — wires modules to the DOM, owns UI state transitions
     ================================================================== */
  const App = {
    els: {},
    currentTitle: '',

    init(){
      this.cacheEls();
      Theme.init();
      Sound.init();
      Confetti.init();
      Ring.init();
      this.bindGlobalControls();
      this.bindSetupForm();
      this.bindDisplayControls();
      this.buildPresets();
      this.setMinDatetime();
      this.restoreFromStorage();
    },

    cacheEls(){
      this.els = {
        setupPanel: document.getElementById('setupPanel'),
        displayPanel: document.getElementById('displayPanel'),
        completePanel: document.getElementById('completePanel'),
        eventTitle: document.getElementById('eventTitle'),
        targetDate: document.getElementById('targetDate'),
        errorMsg: document.getElementById('errorMsg'),
        errorText: document.getElementById('errorText'),
        startBtn: document.getElementById('startBtn'),
        presets: document.getElementById('presets'),
        eventLabelDisplay: document.getElementById('eventLabelDisplay'),
        eventSublabel: document.getElementById('eventSublabel'),
        statusPill: document.getElementById('statusPill'),
        statusText: document.getElementById('statusText'),
        valDays: document.getElementById('valDays'),
        valHours: document.getElementById('valHours'),
        valMinutes: document.getElementById('valMinutes'),
        valSeconds: document.getElementById('valSeconds'),
        progressFill: document.getElementById('progressFill'),
        pauseResumeBtn: document.getElementById('pauseResumeBtn'),
        editBtn: document.getElementById('editBtn'),
        resetBtn: document.getElementById('resetBtn'),
        completeSub: document.getElementById('completeSub'),
        newCountdownBtn: document.getElementById('newCountdownBtn'),
        themeToggle: document.getElementById('themeToggle'),
        soundToggle: document.getElementById('soundToggle'),
        fullscreenToggle: document.getElementById('fullscreenToggle')
      };
    },

    setMinDatetime(){
      // Prevent picking a date/time in the past via the native picker
      const now = new Date(Date.now() - Date.now() % 60000);
      const iso = new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0,16);
      this.els.targetDate.min = iso;
    },

    buildPresets(){
      const presets = [
        { label: 'New Year', getDate: () => { const d = new Date(); const y = d.getMonth() === 0 && d.getDate() === 1 ? d.getFullYear() : d.getFullYear() + 1; return new Date(y, 0, 1, 0, 0, 0); } },
        { label: '+1 hour', getDate: () => new Date(Date.now() + 60 * 60 * 1000) },
        { label: '+24 hours', getDate: () => new Date(Date.now() + 24 * 60 * 60 * 1000) },
        { label: '+7 days', getDate: () => new Date(Date.now() + 7 * 24 * 60 * 60 * 1000) },
        { label: '+30 days', getDate: () => new Date(Date.now() + 30 * 24 * 60 * 60 * 1000) }
      ];
      presets.forEach(p => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'chip';
        chip.textContent = p.label;
        chip.addEventListener('click', () => {
          const d = p.getDate();
          this.els.targetDate.value = this.toLocalInputValue(d);
          this.clearError();
          [...this.els.presets.children].forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
        });
        this.els.presets.appendChild(chip);
      });
    },

    toLocalInputValue(date){
      const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0,16);
    },

    bindGlobalControls(){
      this.els.themeToggle.addEventListener('click', () => Theme.toggle());
      this.els.soundToggle.addEventListener('click', () => Sound.toggle());
      this.els.fullscreenToggle.addEventListener('click', () => this.toggleFullscreen());

      document.addEventListener('keydown', (e) => {
        // Ignore shortcuts while typing in a field
        const tag = (e.target && e.target.tagName) || '';
        if(tag === 'INPUT' || tag === 'TEXTAREA') return;

        if(e.code === 'Space' && !this.els.displayPanel.hidden){
          e.preventDefault();
          this.handlePauseResume();
        }else if((e.key === 'r' || e.key === 'R') && !this.els.displayPanel.hidden){
          this.handleReset();
        }else if(e.key === 'f' || e.key === 'F'){
          this.toggleFullscreen();
        }
      });
    },

    toggleFullscreen(){
      if(!document.fullscreenElement){
        document.documentElement.requestFullscreen().catch(() => {});
      }else{
        document.exitFullscreen().catch(() => {});
      }
    },

    bindSetupForm(){
      this.els.startBtn.addEventListener('click', () => this.handleStart());
      this.els.targetDate.addEventListener('input', () => this.clearError());
      this.els.eventTitle.addEventListener('keydown', (e) => { if(e.key === 'Enter') this.handleStart(); });
    },

    bindDisplayControls(){
      this.els.pauseResumeBtn.addEventListener('click', () => this.handlePauseResume());
      this.els.resetBtn.addEventListener('click', () => this.handleReset());
      this.els.editBtn.addEventListener('click', () => this.handleEdit());
      this.els.newCountdownBtn.addEventListener('click', () => this.handleReset());
    },

    showError(message){
      this.els.errorText.textContent = message;
      this.els.errorMsg.hidden = false;
      this.els.targetDate.style.borderColor = 'var(--danger)';
    },

    clearError(){
      this.els.errorMsg.hidden = true;
      this.els.targetDate.style.borderColor = '';
    },

    validate(){
      const raw = this.els.targetDate.value;
      if(!raw){
        this.showError('Choose a date and time to begin.');
        return null;
      }
      const target = new Date(raw).getTime();
      if(isNaN(target)){
        this.showError('That date doesn\u2019t look valid. Please check and try again.');
        return null;
      }
      if(target <= Date.now()){
        this.showError('Please choose a date in the future.');
        return null;
      }
      return target;
    },

    handleStart(){
      const target = this.validate();
      if(target === null) return;
      this.currentTitle = this.els.eventTitle.value.trim() || 'Untitled countdown';
      const startTime = Date.now();
      Timer.start(target, startTime);
      this.wireTimerCallbacks();
      this.showDisplayPanel();
      this.persist();
    },

    wireTimerCallbacks(){
      Timer.onTick = (data) => this.renderTick(data);
      Timer.onComplete = () => this.handleComplete();
    },

    showDisplayPanel(){
      this.els.setupPanel.hidden = true;
      this.els.completePanel.hidden = true;
      this.els.displayPanel.hidden = false;
      this.els.eventLabelDisplay.textContent = this.currentTitle;
      this.updateSublabel();
      this.updateStatusPill();
    },

    updateSublabel(){
      if(!Timer.targetTime){ this.els.eventSublabel.textContent = '—'; return; }
      const d = new Date(Timer.targetTime);
      this.els.eventSublabel.textContent = d.toLocaleString(undefined, { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
    },

    updateStatusPill(){
      const isPaused = Timer.status === 'paused';
      this.els.statusPill.classList.toggle('paused', isPaused);
      this.els.statusText.textContent = isPaused ? 'Paused' : 'Counting down';
      this.els.pauseResumeBtn.textContent = isPaused ? 'Resume' : 'Pause';
    },

    renderTick(data){
      this.setDigit(this.els.valDays, this.pad(data.days));
      this.setDigit(this.els.valHours, this.pad(data.hours));
      this.setDigit(this.els.valMinutes, this.pad(data.minutes));
      this.setDigit(this.els.valSeconds, this.pad(data.seconds));

      Ring.setProgress(data.fraction);
      this.els.progressFill.style.width = (Math.min(Math.max(data.fraction,0),1) * 100).toFixed(2) + '%';

      // subtle tick sound on the final ten seconds only — refined, not noisy
      if(data.wholeSecondChanged && data.days === 0 && data.hours === 0 && data.minutes === 0 && data.seconds <= 10 && data.seconds > 0){
        Sound.playTick();
      }
    },

    setDigit(el, value){
      if(el.textContent === value) return;
      el.textContent = value;
      el.classList.remove('flip');
      // force reflow so the animation can retrigger
      void el.offsetWidth;
      el.classList.add('flip');
    },

    pad(n){ return String(n).padStart(2, '0'); },

    handlePauseResume(){
      if(Timer.status === 'running'){
        Timer.pause();
      }else if(Timer.status === 'paused'){
        Timer.resume();
      }
      this.updateStatusPill();
      this.persist();
    },

    handleReset(){
      Timer.reset();
      Storage.clearState();
      this.els.displayPanel.hidden = true;
      this.els.completePanel.hidden = true;
      this.els.setupPanel.hidden = false;
      this.els.eventTitle.value = '';
      this.els.targetDate.value = '';
      this.clearError();
      [...this.els.presets.children].forEach(c => c.classList.remove('active'));
      this.els.eventTitle.focus();
    },

    handleEdit(){
      // Return to setup, pre-filled with current values, without losing the title
      Timer.pause();
      this.els.displayPanel.hidden = true;
      this.els.setupPanel.hidden = false;
      this.els.eventTitle.value = this.currentTitle === 'Untitled countdown' ? '' : this.currentTitle;
      if(Timer.targetTime){
        this.els.targetDate.value = this.toLocalInputValue(new Date(Timer.targetTime));
      }
      this.clearError();
    },

    handleComplete(){
      this.els.displayPanel.hidden = true;
      this.els.completePanel.hidden = false;
      this.els.completeSub.textContent = `Your countdown to \u201c${this.currentTitle}\u201d has ended.`;
      Sound.playCompletion();
      Confetti.burst();
      Storage.clearState();
    },

    persist(){
      if(Timer.status === 'idle') return;
      Storage.saveState({
        title: this.currentTitle,
        targetTime: Timer.targetTime,
        startTime: Timer.startTime,
        status: Timer.status
      });
    },

    restoreFromStorage(){
      const state = Storage.loadState();
      if(!state || !state.targetTime) return;

      this.currentTitle = state.title || 'Untitled countdown';

      if(state.targetTime <= Date.now()){
        // Target already passed while the tab was closed — show completion directly
        Storage.clearState();
        this.els.setupPanel.hidden = true;
        this.els.completePanel.hidden = false;
        this.els.completeSub.textContent = `Your countdown to \u201c${this.currentTitle}\u201d has ended.`;
        return;
      }

      Timer.resumeFromState(state.targetTime, state.startTime, state.status === 'paused' ? 'paused' : 'running');
      this.wireTimerCallbacks();
      this.showDisplayPanel();
      // Render an immediate frame so the UI isn't blank while paused
      const now = Date.now();
      const remaining = Timer.targetTime - now;
      const totalSeconds = Math.max(Math.ceil(remaining / 1000), 0);
      this.renderTick({
        days: Math.floor(totalSeconds / 86400),
        hours: Math.floor((totalSeconds % 86400) / 3600),
        minutes: Math.floor((totalSeconds % 3600) / 60),
        seconds: totalSeconds % 60,
        fraction: Timer.totalDuration > 0 ? (now - Timer.startTime) / Timer.totalDuration : 0,
        wholeSecondChanged: true
      });
    }
  };

  document.addEventListener('DOMContentLoaded', () => App.init());
})();
</script>
</body>
</html>
